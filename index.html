<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tour Diary">
<meta name="description" content="Tour Diary - Journey & DA Tracker for Government Officers">
<title>Tour Diary</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root {
  --blue: #1565C0;
  --blue-light: #1E88E5;
  --blue-dark: #0D47A1;
  --blue-bg: #E3F2FD;
  --surface: #FFFFFF;
  --bg: #F5F7FA;
  --border: #E0E0E0;
  --text: #1A1A2E;
  --text2: #5C6B7A;
  --text3: #9AA5B1;
  --success: #2E7D32;
  --success-bg: #E8F5E9;
  --danger: #C62828;
  --danger-bg: #FFEBEE;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--blue-dark), var(--blue-light));
  color: #fff;
  padding: 16px 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header-top { display: flex; justify-content: space-between; align-items: flex-start; }
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.header-sub { font-size: 13px; opacity: 0.85; margin-top: 2px; }

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 4px 8px;
  cursor: pointer;
  color: var(--text3);
  font-size: 11px;
  gap: 3px;
  transition: color .2s;
  border: none;
  background: none;
}
.nav-item.active { color: var(--blue); }
.nav-icon {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
}
.nav-item.active .nav-icon svg { stroke: var(--blue); }
.nav-icon svg { stroke: var(--text3); transition: stroke .2s; }

/* Main content */
.main {
  padding: 12px 12px 80px;
  min-height: calc(100vh - 140px);
}

/* Screens */
.screen { display: none; }
.screen.active { display: block; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-title svg { stroke: var(--blue); }

/* Form */
.row { display: flex; gap: 10px; margin-bottom: 10px; }
.field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; }
.field input, .field select, .field textarea {
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 11px;
  font-size: 14px;
  color: var(--text);
  background: var(--surface);
  width: 100%;
  transition: border-color .15s;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--blue-light);
  box-shadow: 0 0 0 3px rgba(30,136,229,0.12);
}
.field textarea { resize: none; height: 60px; line-height: 1.5; }

.btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform .1s, opacity .1s;
  letter-spacing: 0.2px;
}
.btn:active { transform: scale(0.98); opacity: 0.92; }
.btn-primary { background: var(--blue); color: #fff; }

/* Summary stats */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 12px 14px;
  box-shadow: var(--shadow);
}
.stat-label { font-size: 11px; color: var(--text2); font-weight: 500; margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
.stat-value.blue { color: var(--blue); }
.stat-value.green { color: var(--success); }

/* Entry list */
.entry-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 12px 14px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  position: relative;
}
.entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.entry-date { font-size: 12px; font-weight: 700; color: var(--blue); }
.entry-route { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.arrow { font-size: 13px; color: var(--text3); }
.entry-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
.chip {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--bg);
  color: var(--text2);
  border: 1px solid var(--border);
}
.chip.blue { background: var(--blue-bg); color: var(--blue); border-color: #BBDEFB; }
.chip.green { background: var(--success-bg); color: var(--success); border-color: #C8E6C9; }
.entry-purpose { font-size: 12px; color: var(--text2); margin-top: 6px; line-height: 1.4; }
.delete-btn { background: none; border: none; padding: 4px; cursor: pointer; color: var(--text3); border-radius: 6px; }

/* Section heading */
.section-head { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; margin: 14px 0 8px; }

/* Export buttons */
.export-btn {
  display: flex; align-items: center; gap: 10px; padding: 13px 14px; border-radius: var(--radius);
  border: 1.5px solid var(--border); background: var(--surface); color: var(--text);
  font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 10px; width: 100%; text-align: left;
}

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #263238; color: #fff; padding: 10px 20px; border-radius: 24px;
  font-size: 13px; font-weight: 500; opacity: 0; transition: all .25s; z-index: 300; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1 id="header-name">📋 Tour Diary</h1>
      <div class="header-sub" id="header-designation">Journey & DA Tracker</div>
    </div>
  </div>
</div>

<div class="main">

  <div class="screen active" id="screen-add">
    <div class="card">
      <div class="card-title">Departure</div>
      <div class="row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="dep-date" onchange="autoCalculate()">
        </div>
        <div class="field">
          <label>Time (24 Hr)</label>
          <input type="time" id="dep-time" value="09:00" onchange="autoCalculate()">
        </div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>From</label>
        <input type="text" id="from" value="Headquarter" list="places-list">
      </div>
    </div>

    <div class="card">
      <div class="card-title">Arrival</div>
      <div class="row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="arr-date" onchange="autoCalculate()">
        </div>
        <div class="field">
          <label>Time (24 Hr)</label>
          <input type="time" id="arr-time" value="09:30" onchange="autoCalculate()">
        </div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Destination</label>
        <input type="text" id="destination" placeholder="e.g. Arangmow B.O" list="places-list">
      </div>
    </div>

    <datalist id="places-list"></datalist>

    <div class="card">
      <div class="card-title">Travel details</div>
      <div class="row">
        <div class="field">
          <label>Distance (km)</label>
          <input type="number" id="distance" placeholder="0" min="0" oninput="autoCalculate()">
        </div>
        <div class="field">
          <label>Fare paid (₹)</label>
          <input type="number" id="fare" placeholder="0" min="0">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Mode of travel</label>
          <select id="mode">
            <option>Car</option>
            <option>Bus</option>
            <option>Train</option>
            <option>Two-wheeler</option>
            <option>Auto</option>
            <option>On foot</option>
          </select>
        </div>
        <div class="field">
          <label>DA claimed (₹)</label>
          <input type="number" id="da" placeholder="0" min="0">
        </div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Purpose of journey</label>
        <textarea id="purpose" placeholder="e.g. Annual Inspection"></textarea>
      </div>
    </div>

    <button class="btn btn-primary" onclick="saveEntry()">Save entry</button>
  </div>

  <div class="screen" id="screen-records">
    <div id="records-content"></div>
  </div>

  <div class="screen" id="screen-summary">
    <div class="card">
      <div class="card-title">Report Date Range</div>
      <div class="row">
        <div class="field">
          <label>From Date</label>
          <input type="date" id="report-from" onchange="renderSummary()">
        </div>
        <div class="field">
          <label>To Date</label>
          <input type="date" id="report-to" onchange="renderSummary()">
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Total journeys</div>
        <div class="stat-value blue" id="s-count">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Total distance</div>
        <div class="stat-value" id="s-km">0 <span style="font-size:14px;font-weight:400;color:var(--text2)">km</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Fare paid</div>
        <div class="stat-value" id="s-fare">₹0</div>
      </div>
      <div class="stat">
        <div class="stat-label">DA claimed</div>
        <div class="stat-value green" id="s-da">₹0</div>
      </div>
    </div>

    <div class="section-head">Export & share</div>
    <button class="export-btn" onclick="exportCSV()">Download Report (CSV/Excel)</button>
    <button class="export-btn" onclick="shareText()">Share Summary</button>
  </div>

  <div class="screen" id="screen-settings">
    <div class="card">
      <div class="card-title">User Details</div>
      <div class="field" style="margin-bottom:10px">
        <label>Name</label>
        <input type="text" id="set-name">
      </div>
      <div class="field" style="margin-bottom:10px">
        <label>Designation</label>
        <input type="text" id="set-designation">
      </div>
      <div class="field" style="margin-bottom:10px">
        <label>Address</label>
        <input type="text" id="set-address">
      </div>
      <div class="row">
        <div class="field">
          <label>DA Rate (₹)</label>
          <input type="number" id="set-da">
        </div>
        <div class="field">
          <label>Fare Rate / km (₹)</label>
          <input type="number" id="set-fare">
        </div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('add')" id="nav-add">
    <div class="nav-icon">➕</div>
    Add entry
  </button>
  <button class="nav-item" onclick="switchTab('records')" id="nav-records">
    <div class="nav-icon">📋</div>
    Records
  </button>
  <button class="nav-item" onclick="switchTab('summary')" id="nav-summary">
    <div class="nav-icon">📊</div>
    Reports
  </button>
  <button class="nav-item" onclick="switchTab('settings')" id="nav-settings">
    <div class="nav-icon">⚙️</div>
    Settings
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// --- UTILITIES & STORAGE ---
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Convert YYYY-MM-DD to DD-MM-YYYY
function formatDDMMYYYY(isoDate) {
  if (!isoDate) return '';
  const parts = isoDate.split('-');
  if (parts.length !== 3) return isoDate;
  return `${parts[2]}-${parts[1]}-${parts[0]}`;
}

// Global Entries Access
function getAllEntries() {
  try {
    const data = JSON.parse(localStorage.getItem('tour_entries')) || [];
    // Always return sorted Ascending by Dep Date & Time
    return data.sort((a, b) => {
      const dateA = new Date(`${a.depDate}T${a.depTime}`);
      const dateB = new Date(`${b.depDate}T${b.depTime}`);
      return dateA - dateB; 
    });
  } catch(e) { return []; }
}

function saveAllEntries(entries) {
  localStorage.setItem('tour_entries', JSON.stringify(entries));
  updateDynamicDropdowns();
}

// --- SETTINGS ---
function loadSettings() {
  const def = { 
    name: "Mridul Kumar Kalita", 
    designation: "Inspector of Post Offices", 
    address: "Nalbari East Sub Division", 
    daRate: 700, 
    fareRate: 12 
  };
  return JSON.parse(localStorage.getItem('tour_settings')) || def;
}

function saveSettings() {
  const settings = {
    name: document.getElementById('set-name').value,
    designation: document.getElementById('set-designation').value,
    address: document.getElementById('set-address').value,
    daRate: parseFloat(document.getElementById('set-da').value) || 0,
    fareRate: parseFloat(document.getElementById('set-fare').value) || 0
  };
  localStorage.setItem('tour_settings', JSON.stringify(settings));
  applySettingsToHeader();
  showToast('Settings Saved!');
}

function applySettingsToHeader() {
  const s = loadSettings();
  document.getElementById('set-name').value = s.name;
  document.getElementById('set-designation').value = s.designation;
  document.getElementById('set-address').value = s.address;
  document.getElementById('set-da').value = s.daRate;
  document.getElementById('set-fare').value = s.fareRate;

  if (s.name) document.getElementById('header-name').textContent = s.name;
  if (s.designation) document.getElementById('header-designation').textContent = s.designation;
}

// --- AUTO CALCULATIONS & DYNAMIC UI ---
function updateDynamicDropdowns() {
  const entries = getAllEntries();
  const places = new Set(['Headquarter']); // Default stays
  entries.forEach(e => {
    if(e.from) places.add(e.from);
    if(e.destination) places.add(e.destination);
  });
  
  const datalist = document.getElementById('places-list');
  datalist.innerHTML = '';
  places.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    datalist.appendChild(opt);
  });
}

function autoCalculate() {
  const distance = parseFloat(document.getElementById('distance').value) || 0;
  const s = loadSettings();
  const daRate = parseFloat(s.daRate) || 0;
  const fareRate = parseFloat(s.fareRate) || 0;

  // Auto Fare = Distance * Fare Rate
  document.getElementById('fare').value = Math.round(distance * fareRate);

  // Auto DA Logic
  if (distance <= 0) {
    document.getElementById('da').value = 0;
    return;
  }

  const depDate = document.getElementById('dep-date').value;
  const depTime = document.getElementById('dep-time').value;
  const arrDate = document.getElementById('arr-date').value;
  const arrTime = document.getElementById('arr-time').value;

  if (distance < 8) {
    document.getElementById('da').value = 0;
  } else if (depDate && depTime && arrDate && arrTime) {
    const start = new Date(`${depDate}T${depTime}`);
    const end = new Date(`${arrDate}T${arrTime}`);
    const diffHours = (end - start) / (1000 * 60 * 60);

    if (diffHours > 0) {
      if (diffHours < 12) {
        document.getElementById('da').value = Math.round(daRate * 0.70);
      } else {
        document.getElementById('da').value = Math.round(daRate * 1.00);
      }
    }
  }
}

// --- CORE FUNCTIONS ---
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  if (tab === 'records') renderRecords();
  if (tab === 'summary') renderSummary();
}

function initDates() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('dep-date').value = today;
  document.getElementById('arr-date').value = today;
  
  // Set default report range to current month
  const firstDay = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
  document.getElementById('report-from').value = firstDay;
  document.getElementById('report-to').value = today;
}

function saveEntry() {
  const depDate = document.getElementById('dep-date').value;
  const destination = document.getElementById('destination').value.trim();
  if (!depDate || !destination) {
    showToast('Please fill date and destination');
    return;
  }
  const entries = getAllEntries();
  const entry = {
    id: Date.now(),
    depDate,
    depTime: document.getElementById('dep-time').value,
    from: document.getElementById('from').value.trim() || 'Headquarter',
    arrDate: document.getElementById('arr-date').value || depDate,
    arrTime: document.getElementById('arr-time').value,
    destination,
    distance: +document.getElementById('distance').value || 0,
    fare: +document.getElementById('fare').value || 0,
    mode: document.getElementById('mode').value,
    da: +document.getElementById('da').value || 0,
    purpose: document.getElementById('purpose').value.trim()
  };
  
  entries.push(entry); 
  saveAllEntries(entries); // Saves and sorts date-wise ascending
  
  // Reset Form
  ['destination','distance','fare','da','purpose'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('from').value = 'Headquarter'; // Default back to HQ
  showToast('Entry saved!');
}

function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  const entries = getAllEntries().filter(e => e.id !== id);
  saveAllEntries(entries);
  renderRecords();
  showToast('Entry deleted');
}

function renderRecords() {
  const entries = getAllEntries();
  const el = document.getElementById('records-content');
  if (!entries.length) {
    el.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--text2)"><h3>No entries yet</h3></div>`;
    return;
  }
  el.innerHTML = entries.map(e => `
    <div class="entry-card">
      <div class="entry-header">
        <div class="entry-date">${formatDDMMYYYY(e.depDate)} &nbsp;${e.depTime}–${e.arrTime}</div>
        <button class="delete-btn" onclick="deleteEntry(${e.id})">🗑️</button>
      </div>
      <div class="entry-route">${e.from} <span class="arrow">→</span> ${e.destination}</div>
      <div class="entry-chips">
        <span class="chip">${e.distance} km</span>
        <span class="chip blue">₹${e.fare}</span>
        <span class="chip green">DA ₹${e.da}</span>
      </div>
      ${e.purpose ? `<div class="entry-purpose">📝 ${e.purpose}</div>` : ''}
    </div>
  `).join('');
}

function getFilteredEntries() {
  const fromD = document.getElementById('report-from').value;
  const toD = document.getElementById('report-to').value;
  return getAllEntries().filter(e => e.depDate >= fromD && e.depDate <= toD);
}

function renderSummary() {
  const entries = getFilteredEntries();
  const totalKm = entries.reduce((a, e) => a + e.distance, 0);
  const totalFare = entries.reduce((a, e) => a + e.fare, 0);
  const totalDA = entries.reduce((a, e) => a + e.da, 0);
  
  document.getElementById('s-count').textContent = entries.length;
  document.getElementById('s-km').innerHTML = `${totalKm} <span style="font-size:14px;font-weight:400;color:var(--text2)">km</span>`;
  document.getElementById('s-fare').textContent = '₹' + totalFare;
  document.getElementById('s-da').textContent = '₹' + totalDA;
}

function exportCSV() {
  const entries = getFilteredEntries();
  const s = loadSettings();
  if (!entries.length) { showToast('No data in this date range'); return; }
  
  let header = `Name: ${s.name}, Designation: ${s.designation}\n`;
  header += 'Date,Dep Time,From,Arr Date,Arr Time,Destination,Distance (km),Fare (₹),Mode,DA (₹),Purpose\n';
  
  const rows = entries.map(e => 
    [formatDDMMYYYY(e.depDate), e.depTime, e.from, formatDDMMYYYY(e.arrDate), e.arrTime, e.destination,
     e.distance, e.fare, e.mode, e.da, '"' + (e.purpose || '') + '"'].join(',')
  ).join('\n');
  
  const blob = new Blob([header + rows], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Tour_Report_${formatDDMMYYYY(document.getElementById('report-from').value)}_to_${formatDDMMYYYY(document.getElementById('report-to').value)}.csv`;
  a.click();
}

async function shareText() {
  const entries = getFilteredEntries();
  const s = loadSettings();
  const text = `📋 Tour Summary (${formatDDMMYYYY(document.getElementById('report-from').value)} to ${formatDDMMYYYY(document.getElementById('report-to').value)})\nOfficer: ${s.name}\nJourneys: ${entries.length}\nTotal Distance: ${entries.reduce((a,e)=>a+e.distance,0)} km\nTotal DA: ₹${entries.reduce((a,e)=>a+e.da,0)}`;
  
  if (navigator.share) {
    try { await navigator.share({ title: 'Tour Summary', text }); return; } catch(e) {}
  }
  await navigator.clipboard.writeText(text);
  showToast('Summary copied to clipboard!');
}

// Initialization
applySettingsToHeader();
initDates();
updateDynamicDropdowns();
renderSummary();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.log('SW failed:', e));
  });
}
</script>
